name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  build-lib:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up temurin-jdk-17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Android SDK + NDK r28
        uses: android-actions/setup-android@v3
        with:
          packages: ndk;28.0.13004108
      
      - name: Build
        run: ./gradlew :lib:assembleRelease

      - name: Verify 16 KB page alignment
        run: |
          for so in lib/build/intermediates/cxx/RelWithDebInfo/*/obj/*.so; do
            echo "Checking $(basename $so)..."
            readelf -lL "$so" | grep LOAD | while read line; do
              align=$(echo "$line" | grep -oP 'Align: 0x\K[0-9a-fA-F]+')
              if [ "$align" != "4000" ]; then
                echo "FAIL: $(basename $so) has alignment 0x$align (expected 0x4000)"
                exit 1
              fi
            done
          done || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lib
          path: lib/build/outputs/aar/*-release.aar

      - name: Stage snapshot artifacts
        if: ${{ (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) }}
        run: >
          ./gradlew :lib:publishReleasePublicationToStagingDeployRepository
          -Puvccamera.version=${{ github.event_name == 'pull_request' && format('PR-{0}-SNAPSHOT', github.event.pull_request.number) || 'main-SNAPSHOT' }}
      
      - name: Check secrets
        id: check-secrets
        run: |
          echo "has_maven=${{ secrets.MAVEN_CENTRAL_USERNAME != '' && secrets.MAVEN_CENTRAL_PASSWORD != '' }}" >> $GITHUB_OUTPUT
          echo "has_gpg=${{ secrets.GPG_PUBLIC_KEY != '' && secrets.GPG_PRIVATE_KEY != '' }}" >> $GITHUB_OUTPUT
          echo "has_pat=${{ secrets.GITHUB_TOKEN != '' }}" >> $GITHUB_OUTPUT

      - name: Publish snapshot artifacts (Maven Central)
        if: >-
          github.event_name == 'push' && github.ref_name == 'main'
          && steps.check-secrets.outputs.has_maven == 'true'
          && steps.check-secrets.outputs.has_gpg == 'true'
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JRELEASER_NEXUS2_SNAPSHOTS_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          JRELEASER_NEXUS2_SNAPSHOTS_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
          JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: ./gradlew jreleaserDeploy --no-configuration-cache -Puvccamera.version=main-SNAPSHOT

      - name: Publish to GitHub Packages
        if: ${{ steps.check-secrets.outputs.has_pat == 'true' && github.event_name == 'push' && github.ref_name == 'main' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :lib:publishReleasePublicationToGitHubPackagesRepository -Puvccamera.version=main-SNAPSHOT
